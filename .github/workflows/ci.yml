name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Least-privilege default token.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: CGO_ENABLED=0 go vet ./...

      - name: go test
        run: CGO_ENABLED=0 go test ./... -v -count=1 -timeout 120s

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # The race detector requires CGO. This is the one CI job that builds with
      # CGO_ENABLED=1; the static-distribution guarantee is enforced separately
      # by verify-no-cgo below.
      - name: go test -race
        run: CGO_ENABLED=1 go test ./... -race -count=1 -timeout 300s

  verify-no-cgo:
    name: Verify pure-Go cross-compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: linux/amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./...

      - name: darwin/arm64
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./...

      - name: windows/amd64
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./...
