name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Least-privilege default token.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: CGO_ENABLED=0 go vet ./...

      - name: go test
        run: CGO_ENABLED=0 go test ./... -v -count=1 -timeout 120s

  verify-no-cgo:
    name: Verify pure-Go cross-compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: linux/amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./...

      - name: darwin/arm64
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./...

      - name: windows/amd64
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./...
