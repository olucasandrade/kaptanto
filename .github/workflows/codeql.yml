name: CodeQL

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Weekly re-scan so newly published CodeQL queries catch existing code.
    - cron: "27 4 * * 1"

# Blocking: findings surface in the Security tab and the "CodeQL" code-scanning
# check fails on new error-level alerts. To enforce on merge, use a code-scanning
# ruleset ("Require code scanning results") rather than a required status check —
# the status check alone does not gate on CodeQL alerts. See security.yml.
jobs:
  analyze:
    name: CodeQL (Go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      contents: read
      actions: read
    steps:
      # CodeQL's diff-informed analysis fetches the PR base branch during the
      # analyze step, which needs the checkout-persisted credentials — so we do
      # NOT set persist-credentials: false here (unlike every other workflow).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.1 # zizmor: ignore[artipacked]

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          # Go only. The Rust FFI crate is covered by cargo-audit (rust-audit.yml)
          # to avoid standing up the CGO + cbindgen build path in CI.
          languages: go
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        env:
          CGO_ENABLED: "0"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:go"
