name: Rust Audit

on:
  push:
    branches: ["**"]
    paths:
      - "rust/**"
      - ".github/workflows/rust-audit.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "rust/**"
      - ".github/workflows/rust-audit.yml"
  schedule:
    # Weekly so freshly published RustSec advisories are caught even without
    # a code change to the FFI crate.
    - cron: "27 5 * * 1"

# Blocking: covers the Rust FFI crate that CodeQL deliberately skips.
jobs:
  cargo-audit:
    name: cargo-audit (Rust CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      # Install a prebuilt cargo-audit binary instead of compiling it from
      # source (the rustsec/audit-check action does the latter, which flakes on
      # transient crates.io fetch errors — unacceptable for a blocking gate).
      - name: Install cargo-audit
        uses: taiki-e/install-action@ffdab026038b43b56c3c9540cdadb98181c6155c # v2.27.8
        with:
          # Pin a recent version: cargo-audit < 0.21 cannot parse CVSS-4.0
          # advisories in the RustSec DB ("unsupported CVSS version: 4.0").
          tool: cargo-audit@0.22.2

      - name: cargo-audit
        working-directory: rust/kaptanto-ffi
        run: cargo audit
