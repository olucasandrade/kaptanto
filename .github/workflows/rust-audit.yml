name: Rust Audit

on:
  push:
    branches: ["**"]
    paths:
      - "rust/**"
      - ".github/workflows/rust-audit.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "rust/**"
      - ".github/workflows/rust-audit.yml"
  schedule:
    # Weekly so freshly published RustSec advisories are caught even without
    # a code change to the FFI crate.
    - cron: "27 5 * * 1"

# Blocking: covers the Rust FFI crate that CodeQL deliberately skips.
jobs:
  cargo-audit:
    name: cargo-audit (Rust CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: cargo-audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: rust/kaptanto-ffi
