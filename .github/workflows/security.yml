name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Blocking: these jobs fail the workflow on a finding. govulncheck is
# symbol-aware (only reachable CVEs) and gitleaks has a low false-positive
# rate, so gating here is safe. gitleaks SARIF is still uploaded to the
# Security tab. (Make these required checks via branch protection on main.)
jobs:
  govulncheck:
    name: govulncheck (Go CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      # Symbol-aware Go vulnerability scan (Go team). Only flags CVEs in code
      # paths actually reachable from this module. Blocking.
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits
          persist-credentials: false

      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
