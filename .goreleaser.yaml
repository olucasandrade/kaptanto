version: 2
project_name: kaptanto

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: kaptanto
    main: ./cmd/kaptanto
    binary: kaptanto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/olucasandrade/kaptanto/internal/version.Version={{ .Version }}'
      - -X 'github.com/olucasandrade/kaptanto/internal/version.Commit={{ .Commit }}'
      - -X 'github.com/olucasandrade/kaptanto/internal/version.BuildDate={{ .Date }}'

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: kaptanto
    name: kaptanto
  prerelease: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
