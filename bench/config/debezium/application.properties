# Debezium Server configuration for the Kaptanto benchmark harness
# Image: quay.io/debezium/server:3.4.2.Final
#
# Source: Postgres (shared benchmark instance)
# Sink:   Redis (shared redis service in compose network)
#
# Note: Debezium Server 3.x has no stdout sink.
# Redis is used because it is already required by Sequin, avoiding an extra
# service. The bench Redis instance acts as a blackhole for this benchmark —
# captured events are not consumed further.

# ---------------------------------------------------------------------------
# Source: PostgreSQL via pgoutput logical replication
# ---------------------------------------------------------------------------
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.plugin.name=pgoutput
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=bench
debezium.source.database.password=bench
debezium.source.database.dbname=bench
debezium.source.topic.prefix=bench
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=0
debezium.source.table.include.list=public.bench_events
debezium.source.slot.name=debezium_bench

# ---------------------------------------------------------------------------
# Sink: Redis (shared bench redis service)
# ---------------------------------------------------------------------------
debezium.sink.type=redis
debezium.sink.redis.address=redis:6379
