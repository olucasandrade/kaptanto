# Kaptanto Benchmark Harness
# Starts all CDC tools against a shared Postgres 16 benchmark instance.
#
# Usage: docker compose up --build    (from bench/ directory)
# All image tags are pinned.
#
# Service topology:
#   postgres (shared benchmark source, wal_level=logical)
#     ├── kaptanto (built from source via Dockerfile.bench)
#     ├── debezium (quay.io/debezium/server, HTTP sink → collector)
#     ├── debezium-connect (quay.io/debezium/connect, sink → redpanda)
#     ├── sequin (needs sequin-postgres + redis)
#     └── peerdb-server, flow-api, flow-worker, flow-snapshot-worker, peerdb-ui
#         └── temporal (needs peerdb-postgres)
#   redis (shared: debezium sink + sequin)
#   sequin-postgres (isolated metadata DB for Sequin)
#   peerdb-postgres (isolated catalog DB for PeerDB + Temporal)

# Cap all container logs at 10 MB (2 × 5 MB files) so repeated JVM restarts
# (Debezium Server, Debezium Connect, Temporal) don't exhaust GHA runner disk
# across 5 isolated docker-compose cycles.
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "5m"
      max-file: "2"

services:

  # ---------------------------------------------------------------------------
  # Shared benchmark Postgres — CDC source for all three tools
  # wal_level=logical is required by all CDC connectors
  # max_wal_senders/slots=20 avoids "all slots in use" with 3 concurrent tools
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.13-alpine
    <<: *default-logging
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=20
      -c max_replication_slots=20
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Shared Redis — Debezium sink + Sequin internal broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2.4-alpine
    <<: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kaptanto — built from source via bench/Dockerfile.bench
  # Build context is repo root because Go source lives there.
  # Healthcheck: GET /healthz on observability port (cfg.Port+1 = 7655)
  # ---------------------------------------------------------------------------
  kaptanto:
    build:
      context: ..
      dockerfile: bench/Dockerfile.bench
    <<: *default-logging
    ports:
      - "7654:7654"
    command:
      - --source
      - postgres://bench:bench@postgres:5432/bench
      - --output
      - sse
      - --port
      - "7654"
      - --tables
      - public.bench_events
      - --data-dir
      - /data
      - --insecure
    volumes:
      - kaptanto-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7654/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Kaptanto (Rust FFI) — same binary with CGO+Rust parser acceleration
  # Built from Dockerfile.bench-rust; uses source-id "rust" → slot kaptanto_rust
  # ---------------------------------------------------------------------------
  kaptanto-rust:
    build:
      context: ..
      dockerfile: bench/Dockerfile.bench-rust
    <<: *default-logging
    ports:
      - "7656:7656"
    command:
      - --source
      - postgres://bench:bench@postgres:5432/bench
      - --output
      - sse
      - --port
      - "7656"
      - --tables
      - public.bench_events
      - --data-dir
      - /data
      - --source-id
      - rust
      - --insecure
    volumes:
      - kaptanto-rust-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7656/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Kaptanto (Kafka sink) — built from source, streams CDC events to Redpanda
  # Config file mounted from bench/config/kaptanto-kafka.yaml
  # Observability on port 7657; depends on postgres + redpanda
  # ---------------------------------------------------------------------------
  kaptanto-kafka:
    build:
      context: ..
      dockerfile: bench/Dockerfile.bench
    <<: *default-logging
    ports:
      - "7657:7657"
    command:
      - --config
      - /config/kaptanto-kafka.yaml
      - --data-dir
      - /data
    volumes:
      - kaptanto-kafka-data:/data
      - ./config/kaptanto-kafka.yaml:/config/kaptanto-kafka.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7657/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # NATS — standalone NATS server for kaptanto NATS sink
  # Monitoring port 8222 used for healthcheck probe
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    <<: *default-logging
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # nats-init — one-shot service that pre-creates the bench_cdc JetStream stream.
  # kaptanto-nats does a fail-fast check at startup (stream must exist), so this
  # must complete before kaptanto-nats starts. The scenarios runner also calls
  # CreateOrUpdateStream, so this is idempotent.
  # ---------------------------------------------------------------------------
  nats-init:
    image: natsio/nats-box:0.14.5
    <<: *default-logging
    command:
      - sh
      - -c
      - |
        cat > /tmp/stream.json << 'EOF'
        {"name":"bench_cdc","subjects":["cdc.>"],"storage":"memory","retention":"limits","max_msgs":-1,"max_bytes":-1,"max_age":0,"num_replicas":1,"duplicate_window":120000000000}
        EOF
        nats stream add --config /tmp/stream.json --server=nats://nats:4222 2>/dev/null \
          || nats stream info bench_cdc --server=nats://nats:4222 > /dev/null
    depends_on:
      nats:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Kaptanto (NATS sink) — built from source, streams CDC events to NATS
  # Config file mounted from bench/config/kaptanto-nats.yaml
  # Observability on port 7658; depends on postgres + nats-init
  # ---------------------------------------------------------------------------
  kaptanto-nats:
    build:
      context: ..
      dockerfile: bench/Dockerfile.bench
    <<: *default-logging
    ports:
      - "7658:7658"
    command:
      - --config
      - /config/kaptanto-nats.yaml
      - --data-dir
      - /data
    volumes:
      - kaptanto-nats-data:/data
      - ./config/kaptanto-nats.yaml:/config/kaptanto-nats.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7658/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Kaptanto cluster node 1 — coordinates with node 2 via NATS, Kafka sink output
  # ---------------------------------------------------------------------------
  kaptanto-cluster-node-1:
    build:
      context: ..
      dockerfile: bench/Dockerfile.bench
    <<: *default-logging
    ports:
      - "7659:7659"
    command:
      - --config
      - /config/kaptanto-cluster-node1.yaml
      - --data-dir
      - /data
    volumes:
      - kaptanto-cluster-node1-data:/data
      - ./config/kaptanto-cluster-node1.yaml:/config/kaptanto-cluster-node1.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7659/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 25s

  # ---------------------------------------------------------------------------
  # Kaptanto cluster node 2 — coordinates with node 1 via NATS, Kafka sink output
  # ---------------------------------------------------------------------------
  kaptanto-cluster-node-2:
    build:
      context: ..
      dockerfile: bench/Dockerfile.bench
    <<: *default-logging
    ports:
      - "7660:7660"
    command:
      - --config
      - /config/kaptanto-cluster-node2.yaml
      - --data-dir
      - /data
    volumes:
      - kaptanto-cluster-node2-data:/data
      - ./config/kaptanto-cluster-node2.yaml:/config/kaptanto-cluster-node2.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7660/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 25s

  # ---------------------------------------------------------------------------
  # Debezium Server 3.4.2.Final — Postgres source, Redis sink
  # IMPORTANT: quay.io only — Docker Hub is frozen at 2.x for this image
  # Config mounted from ./config/debezium/application.properties
  # ---------------------------------------------------------------------------
  debezium:
    image: quay.io/debezium/server:3.4.2.Final
    <<: *default-logging
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/debezium:/debezium/config
      - debezium-data:/debezium/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/q/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Debezium Connector (Kafka Connect) 3.4.2.Final — Postgres source, Redpanda sink
  # Streams WAL events to bench-connect.public.bench_events Kafka topic in batches.
  # The connector is registered via the REST API at port 8083 by the scenarios runner.
  # IMPORTANT: quay.io only — Docker Hub is frozen at 2.x for this image
  # ---------------------------------------------------------------------------
  debezium-connect:
    image: quay.io/debezium/connect:3.4.2.Final
    <<: *default-logging
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: bench-connect
      CONFIG_STORAGE_TOPIC: bench-connect-configs
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_TOPIC: bench-connect-offsets
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_TOPIC: bench-connect-status
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Sequin internal Postgres — isolated metadata store for Sequin
  # NOT the benchmark source; the benchmark source is the 'postgres' service above
  # ---------------------------------------------------------------------------
  sequin-postgres:
    image: postgres:16.13-alpine
    <<: *default-logging
    environment:
      POSTGRES_USER: sequin
      POSTGRES_PASSWORD: sequin
      POSTGRES_DB: sequin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sequin -d sequin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Sequin — Postgres CDC via logical replication
  # Uses sequin-postgres for its own metadata, redis for broker,
  # and connects to the shared 'postgres' as CDC source (via sequin.yml config)
  # SECRET_KEY_BASE must be 64+ chars (Phoenix framework requirement)
  # ---------------------------------------------------------------------------
  sequin:
    image: sequin/sequin:v0.14.6
    <<: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PG_HOSTNAME: sequin-postgres
      PG_PORT: "5432"
      PG_DATABASE: sequin
      PG_USERNAME: sequin
      PG_PASSWORD: sequin
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: "bench-secret-key-base-for-dev-only-do-not-use-in-production-xxxxxxxx"
      VAULT_KEY: "A4pGqCTCRNqMcetNETc2ppc97m0gKB3Xba3WTLeY+EA="
      CONFIG_FILE_PATH: /config/sequin.yml
      SERVER_PORT: "7376"
      PHX_SERVER: "true"
    volumes:
      - ./config/sequin:/config
    depends_on:
      sequin-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7376/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ---------------------------------------------------------------------------
  # PeerDB internal Postgres — isolated catalog DB for PeerDB catalog + Temporal
  # ---------------------------------------------------------------------------
  peerdb-postgres:
    image: postgres:16.13-alpine
    <<: *default-logging
    environment:
      POSTGRES_USER: peerdb
      POSTGRES_PASSWORD: peerdb
      POSTGRES_DB: peerdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peerdb -d peerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Temporal — workflow orchestration for PeerDB flow workers
  # Uses peerdb-postgres as its DB backend (auto-setup image creates schema)
  # start_period=60s: Temporal takes 20-30s to initialize schema on first run
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.29
    <<: *default-logging
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: peerdb
      POSTGRES_PWD: peerdb
      POSTGRES_SEEDS: peerdb-postgres
      DYNAMIC_CONFIG_FILE_PATH: /config/dynamicconfig/development-sql.yaml
      BIND_ON_IP: "0.0.0.0"
    volumes:
      - ./config/dynamicconfig:/config/dynamicconfig
    depends_on:
      peerdb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # PeerDB application services — all use stable-v0.36.12 from ghcr.io
  # All require Temporal + peerdb-postgres to be healthy before starting
  # ---------------------------------------------------------------------------
  peerdb-server:
    image: ghcr.io/peerdb-io/peerdb-server:stable-v0.36.12
    <<: *default-logging
    ports:
      - "9900:9900"
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
      PEERDB_CATALOG_HOST: peerdb-postgres
      PEERDB_CATALOG_PORT: "5432"
      PEERDB_CATALOG_USER: peerdb
      PEERDB_CATALOG_PASSWORD: peerdb
      PEERDB_CATALOG_DATABASE: peerdb
    depends_on:
      temporal:
        condition: service_healthy
      peerdb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 9900 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  flow-api:
    image: ghcr.io/peerdb-io/flow-api:stable-v0.36.12
    <<: *default-logging
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
      PEERDB_CATALOG_HOST: peerdb-postgres
      PEERDB_CATALOG_PORT: "5432"
      PEERDB_CATALOG_USER: peerdb
      PEERDB_CATALOG_PASSWORD: peerdb
      PEERDB_CATALOG_DATABASE: peerdb
    depends_on:
      temporal:
        condition: service_healthy
      peerdb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8112/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  flow-worker:
    image: ghcr.io/peerdb-io/flow-worker:stable-v0.36.12
    <<: *default-logging
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
      PEERDB_CATALOG_HOST: peerdb-postgres
      PEERDB_CATALOG_PORT: "5432"
      PEERDB_CATALOG_USER: peerdb
      PEERDB_CATALOG_PASSWORD: peerdb
      PEERDB_CATALOG_DATABASE: peerdb
    depends_on:
      temporal:
        condition: service_healthy
      peerdb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8113/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  flow-snapshot-worker:
    image: ghcr.io/peerdb-io/flow-snapshot-worker:stable-v0.36.12
    <<: *default-logging
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
      PEERDB_CATALOG_HOST: peerdb-postgres
      PEERDB_CATALOG_PORT: "5432"
      PEERDB_CATALOG_USER: peerdb
      PEERDB_CATALOG_PASSWORD: peerdb
      PEERDB_CATALOG_DATABASE: peerdb
    depends_on:
      temporal:
        condition: service_healthy
      peerdb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8114/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  peerdb-ui:
    image: ghcr.io/peerdb-io/peerdb-ui:stable-v0.36.12
    <<: *default-logging
    ports:
      - "3000:3000"
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
      PEERDB_CATALOG_HOST: peerdb-postgres
      PEERDB_CATALOG_PORT: "5432"
      PEERDB_CATALOG_USER: peerdb
      PEERDB_CATALOG_PASSWORD: peerdb
      PEERDB_CATALOG_DATABASE: peerdb
    depends_on:
      peerdb-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redpanda — single-node Kafka-compatible broker for PeerDB Kafka output
  # Using v24.3.10; rpk cluster health used as healthcheck probe
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.3.10
    <<: *default-logging
    command: >
      redpanda start
      --overprovisioned
      --smp 1
      --memory 512M
      --reserve-memory 0M
      --kafka-addr INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      --advertise-kafka-addr INTERNAL://redpanda:9092,EXTERNAL://localhost:29092
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # statsd — polls container CPU% and VmRSS every 2s, writes docker_stats.jsonl
  # pid: "host" is required so the container can read /proc/<host-pid>/status
  # (docker inspect returns host PIDs; those are only visible in the host
  # process namespace, which Docker Desktop bridges from the VM)
  # ---------------------------------------------------------------------------
  statsd:
    build:
      context: .
      dockerfile: Dockerfile.statsd
    <<: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./results:/results
    command: ["--containers=bench-kaptanto-1,bench-kaptanto-rust-1,bench-kaptanto-kafka-1,bench-kaptanto-nats-1,bench-debezium-1,bench-sequin-1,bench-peerdb-server-1,bench-redpanda-1,bench-debezium-connect-1", "--output=/results/docker_stats.jsonl"]
    depends_on:
      kaptanto:
        condition: service_healthy
      kaptanto-rust:
        condition: service_healthy
      kaptanto-kafka:
        condition: service_healthy
      kaptanto-nats:
        condition: service_healthy

# Named volumes
volumes:
  kaptanto-data:
  kaptanto-rust-data:
  kaptanto-kafka-data:
  kaptanto-nats-data:
  kaptanto-cluster-node1-data:
  kaptanto-cluster-node2-data:
  debezium-data:
    # Stores Debezium offset files so the connector resumes from the last
    # committed offset on restart (avoids full re-scan on compose restart)
